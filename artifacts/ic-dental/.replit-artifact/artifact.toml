kind = "web"
previewPath = "/"
title = "IC Dental Clinic"
version = "1.0.0"
id = "artifacts/ic-dental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21660

[services.development]
run = "pnpm --filter @workspace/ic-dental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ic-dental", "run", "build" ]
publicDir = "artifacts/ic-dental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21660"
BASE_PATH = "/"
